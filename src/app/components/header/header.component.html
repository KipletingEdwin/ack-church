
<ion-header>
  <ion-toolbar color="primary">

    <ion-buttons slot="start"> 
      <ion-button>ACK St James Koromosho</ion-button>
    </ion-buttons>

    <ion-buttons slot="end">
      <ion-button (click)="toggleTheme()" > <ion-icon [name]="isDark ? 'moon-outline' : 'sunny-outline'" ></ion-icon> </ion-button>
      <ion-button shape="round" fill="outline" >Give</ion-button>
      <ion-button shape="round" fill="clear">Plan your visit</ion-button>

    </ion-buttons>

  </ion-toolbar>
</ion-header>
