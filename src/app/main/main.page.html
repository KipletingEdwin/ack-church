<ion-header>
    <ion-toolbar>
      <!-- Logo / Title -->
      <ion-buttons slot="start">
        <ion-button [routerLink]="['/']" class="logo-btn">
          ACK St James Koromosho
        </ion-button>
      </ion-buttons>
  
      <!-- Navigation Links (Centered) -->
      <div class="ion-hide-md-down ion-text-center">
        <ion-button fill="clear" [routerLink]="['./about']"  routerLinkActive="active-link">About</ion-button>
        <ion-button fill="clear" [routerLink]="['./services']"  routerLinkActive="active-link">Services</ion-button>
        <ion-button fill="clear" [routerLink]="['./events']"  routerLinkActive="active-link">Events</ion-button>
        <ion-button fill="clear" [routerLink]="['./ministries']"  routerLinkActive="active-link">Ministries</ion-button>
        <ion-button fill="clear" [routerLink]="['./sermons']"  routerLinkActive="active-link">Sermons</ion-button>
        <ion-button fill="clear" [routerLink]="['./contact']"  routerLinkActive="active-link">Contact</ion-button>
      </div>
  
      <!-- Actions -->
      <ion-buttons slot="end">
        <ion-button (click)="toggleTheme()">
          <ion-icon [name]="isDark ? 'moon-outline' : 'sunny-outline'"></ion-icon>
        </ion-button>
        <ion-button shape="round" fill="outline">Give</ion-button>
        <ion-button shape="round" fill="solid" color="primary">Plan Your Visit</ion-button>
      </ion-buttons>
    </ion-toolbar>
  </ion-header>
  
  <ion-content>
    <!-- Loading State -->
    <div *ngIf="isLoading" class="spinner-container ion-text-center">
      <ion-spinner name="crescent"></ion-spinner>
      <p>Loading page...</p>
    </div>
  
    <!-- Main View -->
    <ion-router-outlet *ngIf="!isLoading"></ion-router-outlet>
  </ion-content>
