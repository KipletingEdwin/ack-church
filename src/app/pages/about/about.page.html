<section class="hero-section">

  <!-- Overlay -->
  <div class="overlay"></div>

  <!-- Content -->
  <div class="hero-content">
    <h1 class="title">A Place to Belong</h1>

    <p class="subtitle">
      Join a community of believers where you can grow, connect, and experience God’s love.
    </p>

    <div class="cta-buttons">
      <ion-button shape="round" size="large" class="primary-btn">
        Plan Your Visit
      </ion-button>

      <ion-button shape="round" size="large" fill="outline" class="outline-btn">
        Watch Online
      </ion-button>
    </div>

    <!-- Weekly Schedule -->
    <div class="schedule">
      <h3>Join Us This Week</h3>

      <div class="schedule-grid">

        <div class="day">
          <h4>SUNDAY</h4>
          <p class="event">Sunday Worship</p>
          <p class="time">9:00 AM & 11:00 AM</p>
        </div>

        <div class="day">
          <h4>WEDNESDAY</h4>
          <p class="event">Bible Study</p>
          <p class="time">7:00 PM</p>
        </div>

        <div class="day">
          <h4>FRIDAY</h4>
          <p class="event">Youth Group</p>
          <p class="time">6:30 PM</p>
        </div>

      </div>
    </div>
  </div>

</section>
